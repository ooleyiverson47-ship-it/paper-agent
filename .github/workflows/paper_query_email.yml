name: 定时论文查询并发送邮件

on:
  schedule:
    # 每天北京时间上午9点执行（UTC时间1:00）
    - cron: '0 1 * * *'
    # 每天北京时间下午3点执行（UTC时间7:00）
    - cron: '0 7 * * *'
  # 允许手动触发
  workflow_dispatch:

jobs:
  query-and-send:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v2
    
    - name: 设置 Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.9'
    
    - name: 安装依赖
      run: |
        pip install --upgrade pip
        pip install arxiv requests schedule
        pip list
    
    - name: 运行论文查询
      env:
        QWEN_API_KEY: ${{ secrets.QWEN_API_KEY }}
        EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
      run: |
        python github_runner.py
    
    - name: 上传结果
      uses: actions/upload-artifact@v2
      with:
        name: paper-results
        path: |
          paper_results_*.json
          paper_report_*.html
